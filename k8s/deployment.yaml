apiVersion: apps/v1
kind: Deployment
metadata:
  name: streetlight-api
  labels:
    app: streetlight-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: streetlight-api
  template:
    metadata:
      labels:
        app: streetlight-api
    spec:
      containers:
      - name: streetlight-api
        image: streetlight-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: POLICY_PATH
          value: "/app/policies/policy_v2.pkl"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
